name: Fast Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Restore Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            tr -d '\r\n[:space:]' < debug.keystore.base64 | base64 -d > debug.keystore || tr -d '\r\n[:space:]' < debug.keystore.base64 | base64 --decode > debug.keystore || true
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: poker-equity-hud-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
